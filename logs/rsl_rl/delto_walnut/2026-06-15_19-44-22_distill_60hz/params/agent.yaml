seed: 42
device: cuda:0
num_steps_per_env: 16
max_iterations: 2000
empirical_normalization: true
policy:
  class_name: StudentTeacher
  init_noise_std: 1.0
  noise_std_type: log
  student_hidden_dims:
  - 512
  - 512
  - 256
  - 128
  teacher_hidden_dims:
  - 512
  - 512
  - 256
  - 128
  activation: elu
